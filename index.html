<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Telemetry Matrix - PWA</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { font-size: 1.5rem; border-bottom: 2px solid #0056b3; padding-bottom: 10px; }
        textarea { width: 100%; height: 120px; padding: 10px; margin-top: 15px; border: 1px solid #ccc; border-radius: 4px; resize: vertical; }
        button { background: #0056b3; color: #fff; border: none; padding: 10px 20px; margin-top: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #004494; }
        .hud { margin-top: 25px; padding: 15px; background: #e9ecef; border-left: 4px solid #0056b3; border-radius: 4px; }
        .log { font-family: monospace; font-size: 0.9rem; background: #2b2b2b; color: #50fa7b; padding: 10px; border-radius: 4px; margin-top: 10px; white-space: pre-wrap; }
    </style>
</head>
<body>

<div class="container">
    <h1>Operational Requirement Intake</h1>
    <p>Detail your current operational friction, project goal, or requested system requirements.</p>
    
    <textarea id="intakeInput" placeholder="Enter your project requirements or systemic issues here..."></textarea>
    <button id="processBtn">Execute Telemetry Scan</button>

    <div class="hud" id="telemetryHUD">
        <strong>System Status:</strong> <span id="statusIndicator">Awaiting Input...</span>
        <div class="log" id="systemLog">Baseline initialization pending.</div>
    </div>
</div>

<script type="module" src="./app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="tactical">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Project SHALOM | Telemetry HUD</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root[data-theme="tactical"] {
            --bg-primary: #090a0f;
            --bg-secondary: #12141d;
            --text-primary: #00ffcc;
            --text-secondary: #00b38f;
            --border-accent: #00ffcc;
            --btn-bg: rgba(0, 255, 204, 0.1);
            --error-color: #ff3366;
        }
        :root[data-theme="corporate"] {
            --bg-primary: #f4f5f7;
            --bg-secondary: #ffffff;
            --text-primary: #172b4d;
            --text-secondary: #5e6c84;
            --border-accent: #0052cc;
            --btn-bg: #e9f2ff;
            --error-color: #de350b;
        }
        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 1rem;
            transition: all 0.3s ease;
        }
        .hud-container {
            max-width: 800px;
            margin: 0 auto;
            border: 1px solid var(--border-accent);
            background: var(--bg-secondary);
            padding: 1.5rem;
            border-radius: 4px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }
        .header-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid var(--border-accent);
            padding-bottom: 0.5rem;
        }
        .btn {
            background: var(--btn-bg);
            color: var(--text-primary);
            border: 1px solid var(--border-accent);
            padding: 0.5rem 1rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn:active { transform: scale(0.98); }
        textarea {
            width: 100%;
            height: 100px;
            background: var(--bg-primary);
            color: var(--text-primary);
            border: 1px solid var(--border-accent);
            padding: 0.5rem;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 1rem;
        }
        .terminal-log {
            background: #000;
            color: #0f0;
            padding: 1rem;
            height: 150px;
            overflow-y: auto;
            font-size: 0.85rem;
            border: 1px solid #333;
            margin-bottom: 1rem;
        }
        .error-log { color: var(--error-color); }
        .canvas-area {
            background: var(--bg-primary);
            padding: 1rem;
            border: 1px dashed var(--text-secondary);
            min-height: 100px;
        }
    </script>
</head>
<body>

<div class="hud-container">
    <div class="header-controls">
        <h2>SHALOM // MASTER TELEMETRY</h2>
        <button id="toggleThemeBtn" class="btn">Toggle Environment</button>
    </div>

    <div class="terminal-log" id="sysLog">
        > System standing by...<br>
    </div>

    <textarea id="telemetryInput" placeholder="Enter operational requirements or friction points..."></textarea>
    
    <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
        <button id="executeBtn" class="btn" style="flex: 1;">Execute Telemetry Scan</button>
        <button id="voiceBtn" class="btn">🎤 Voice Intake</button>
    </div>

    <div class="canvas-area" id="outputCanvas">
        <em>Generated artifacts will render here...</em>
    </div>
</div>

<script>
    window.onerror = function(msg, url, lineNo, columnNo, error) {
        const log = document.getElementById('sysLog');
        if(log) log.innerHTML += `<span class="error-log">> [SYS_FAILURE] ${msg} at line ${lineNo}</span><br>`;
        return false;
    };
</script>

<script src="./app.js" type="module"></script>
</body>
</html>
